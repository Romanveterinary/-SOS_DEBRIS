name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Отримуємо код
        uses: actions/checkout@v4

      - name: Налаштовуємо Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Налаштовуємо Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Збірка APK через Capacitor v5
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/android@5
          npm install -D @capacitor/cli@5 @capacitor/assets@3
          npm install @capacitor/geolocation@5
          
          # Ініціалізація проєкту
          npx cap init "SOS" "ua.civil.sosdebris" --web-dir www
          npx cap add android
          
          # Генерація іконок
          if [ -f "icon.png" ]; then
            mkdir -p assets
            mv icon.png assets/icon.png
            npx capacitor-assets generate --android
          fi
          
          # Прописуємо системні дозволи для Android
          sed -i '/android.permission.INTERNET/a \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-feature android:name="android.hardware.camera" />\n    <uses-feature android:name="android.hardware.camera.flash" />' android/app/src/main/AndroidManifest.xml
          
          # КОРЕКТНИЙ ФІКС: Примусово реєструємо Geolocation Plugin в MainActivity з ПРАВИЛЬНИМ імпортом
          sed -i '/public class MainActivity extends BridgeActivity {}/d' android/app/src/main/java/ua/civil/sosdebris/MainActivity.java
          echo -e "package ua.civil.sosdebris;\n\nimport android.os.Bundle;\nimport com.getcapacitor.BridgeActivity;\nimport com.capacitorjs.plugins.geolocation.GeolocationPlugin;\n\npublic class MainActivity extends BridgeActivity {\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n        registerPlugin(GeolocationPlugin.class);\n        super.onCreate(savedInstanceState);\n    }\n}" > android/app/src/main/java/ua/civil/sosdebris/MainActivity.java

          npx cap sync android
          
          # Компіляція
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Вивантажуємо готовий APK
        uses: actions/upload-artifact@v4
        with:
          name: SOS-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
